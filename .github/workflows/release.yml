name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-22.04 # older glibc for broader compatibility
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libudev-dev libinput-dev libseat-dev libsystemd-dev libgtk-3-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/deepseek-balance-applet
          generate_release_notes: true
